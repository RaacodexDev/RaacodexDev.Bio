<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Link Premium | Medsos</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6.5.1 (Versi Terbaru agar Logo X muncul) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Efek Background Bergerak -->
   <video class="bg-video" autoplay muted loop playsinline>
    <source src="asset/Gojo.mp4" type="video/mp4">
</video>

    <div class="container">
        <!-- Bagian Profil dengan Animasi Lingkaran -->
        <header class="profile">
            <div class="profile-wrapper">
                <div class="rotating-border"></div>
                <img src="asset/profile.jpg" alt="Profile" class="profile-img">
            </div>
            <h1>Raacodèx <i class="fas fa-check-circle verified-badge"></i></h1>
            <p class="bio">Digital Creator | Tech Enthusiast<br><span>Building the future, one link at a time. 🚀</span></p>
        </header>

        <!-- Tombol Sosial Media -->
        <main class="links-wrapper">
            <a href="https://saweria.co/Raacodexdev" class="link-card" style="--clr: #F97316;">
      <div class="icon-box">
        <img src="https://saweria.co/favicon.ico" alt="Saweria" style="width:24px;height:24px;border-radius:4px;">
              </div>
              <span>Saweria / Donasi</span>
              <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://instagram.com/raacodex" class="link-card" style="--clr: #E4405F;">
                <div class="icon-box"><i class="fab fa-instagram"></i></div>
                <span>Instagram</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://tiktok.com/@raacodexdev" class="link-card" style="--clr: #010101;">
                <div class="icon-box"><i class="fab fa-tiktok"></i></div>
                <span>TikTok</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <!-- Tombol X / Twitter -->
            <a href="https://x.com/raacodex_dev" class="link-card" style="--clr: #555555;">
                <div class="icon-box"><i class="fa-brands fa-x-twitter"></i></div>
                <span>Twitter / X</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://wa.me/6285141536425" class="link-card" style="--clr: #25D366;">
                <div class="icon-box"><i class="fab fa-whatsapp"></i></div>
                <span>WhatsApp</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>
        </main>

        <p class="footer-credit">made with @raacodèx</p>

    <script src="script.js"></script>
